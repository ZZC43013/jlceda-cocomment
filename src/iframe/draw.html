<!doctype html>
<html lang="zh-Hans">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>绘制批注</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%; height: 100%;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
			font-size: 13px; color: #333; background: #f5f5f5; overflow: hidden;
		}
		.app { display: flex; flex-direction: column; height: 100%; }
		.toolbar {
			display: flex; align-items: center; gap: 4px; padding: 6px 10px;
			background: #fff; border-bottom: 1px solid #e8e8e8; flex-shrink: 0; flex-wrap: wrap;
		}
		.tool-btn {
			width: 32px; height: 32px; border: 1px solid #d9d9d9; border-radius: 4px;
			background: #fff; cursor: pointer; font-size: 16px; display: flex;
			align-items: center; justify-content: center; color: #555; transition: all 0.15s;
		}
		.tool-btn:hover { border-color: #1890ff; color: #1890ff; }
		.tool-btn.active { background: #1890ff; border-color: #1890ff; color: #fff; }
		.tool-divider { width: 1px; height: 24px; background: #e8e8e8; margin: 0 4px; }
		.color-picker { display: flex; gap: 3px; }
		.color-swatch {
			width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
			border: 2px solid transparent; transition: transform 0.1s;
		}
		.color-swatch:hover { transform: scale(1.15); }
		.color-swatch.selected { border-color: #333; }
		.size-select {
			padding: 4px 8px; border: 1px solid #d9d9d9; border-radius: 4px;
			font-size: 12px; outline: none; cursor: pointer;
		}
		.toolbar-info { margin-left: auto; font-size: 11px; color: #999; }
		.canvas-wrap {
			flex: 1; overflow: auto; background: #e8e8e8; padding: 10px;
			display: flex; align-items: flex-start; justify-content: center;
		}
		.canvas-container { position: relative; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
		canvas { display: block; cursor: crosshair; }
		.text-input-overlay { position: absolute; display: none; z-index: 10; }
		.text-input {
			border: 2px dashed #1890ff; padding: 4px 6px; font-size: 14px;
			outline: none; background: rgba(255,255,255,0.95); min-width: 120px;
			min-height: 28px; resize: both; line-height: 1.4; white-space: pre;
			overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
		}
		.text-input-hint {
			position: absolute; top: -18px; left: 0; font-size: 10px; color: #1890ff;
			background: rgba(255,255,255,0.9); padding: 1px 4px; border-radius: 2px; white-space: nowrap;
		}
		.footer {
			display: flex; align-items: center; justify-content: space-between;
			padding: 8px 12px; background: #fff; border-top: 1px solid #e8e8e8; flex-shrink: 0;
		}
		.footer-tips { font-size: 11px; color: #999; }
		.footer-actions { display: flex; gap: 8px; }
		.btn {
			padding: 6px 16px; border: 1px solid #d9d9d9; border-radius: 4px;
			background: #fff; cursor: pointer; font-size: 13px; color: #333; transition: all 0.15s;
		}
		.btn:hover { border-color: #1890ff; color: #1890ff; }
		.btn.primary { background: #1890ff; border-color: #1890ff; color: #fff; }
		.btn.primary:hover { background: #40a9ff; border-color: #40a9ff; }
		.btn.danger { color: #ff4d4f; border-color: #ffa39e; }
		.btn.danger:hover { background: #fff1f0; }
		.paste-hint {
			position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
			padding: 20px 40px; background: rgba(255,255,255,0.95); border: 2px dashed #1890ff;
			border-radius: 8px; color: #1890ff; font-size: 14px; pointer-events: none; display: none; z-index: 5;
		}
	</style>
</head>
<body>
	<div id="fatalError" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff2f0;color:#d4380d;padding:12px;font-size:12px;z-index:9999;overflow:auto;white-space:pre-wrap;font-family:monospace;"></div>
	<div class="app">
		<div class="toolbar">
			<button class="tool-btn active" data-tool="pen" title="画笔">✏️</button>
			<button class="tool-btn" data-tool="rect" title="矩形">▭</button>
			<button class="tool-btn" data-tool="arrow" title="箭头">➤</button>
			<button class="tool-btn" data-tool="text" title="文字">T</button>
			<div class="tool-divider"></div>
			<div class="color-picker" id="colorPicker">
				<div class="color-swatch selected" style="background:#ff4d4f" data-color="#ff4d4f"></div>
				<div class="color-swatch" style="background:#1890ff" data-color="#1890ff"></div>
				<div class="color-swatch" style="background:#52c41a" data-color="#52c41a"></div>
				<div class="color-swatch" style="background:#fa8c16" data-color="#fa8c16"></div>
				<div class="color-swatch" style="background:#722ed1" data-color="#722ed1"></div>
				<div class="color-swatch" style="background:#333333" data-color="#333333"></div>
			</div>
			<select class="size-select" id="sizeSelect">
				<option value="2">细</option>
				<option value="4" selected>中</option>
				<option value="6">粗</option>
				<option value="10">特粗</option>
			</select>
			<select class="size-select" id="fontSizeSelect" title="文字字号">
				<option value="12">12px</option>
				<option value="14" selected>14px</option>
				<option value="16">16px</option>
				<option value="20">20px</option>
				<option value="24">24px</option>
				<option value="32">32px</option>
			</select>
			<div class="tool-divider"></div>
			<button class="tool-btn" id="undoBtn" title="撤销">↶</button>
			<button class="tool-btn" id="clearBtn" title="清空">🗑</button>
			<div class="tool-divider"></div>
			<button class="tool-btn" id="uploadBtn" title="上传图片">📁</button>
			<input type="file" id="fileInput" accept="image/*" style="display:none" />
			<span class="toolbar-info" id="canvasInfo">800 × 500</span>
		</div>

		<div class="canvas-wrap" id="canvasWrap">
			<div class="canvas-container" id="canvasContainer">
				<canvas id="mainCanvas" width="800" height="500"></canvas>
				<div class="text-input-overlay" id="textOverlay">
				<div class="text-input-hint" id="textHint">Enter 换行 · Ctrl+Enter 完成 · Esc 取消</div>
				<textarea class="text-input" id="textInput" placeholder="输入文字..." rows="1"></textarea>
			</div>
				<div class="paste-hint" id="pasteHint">按 Ctrl+V 粘贴截图</div>
			</div>
		</div>

		<div class="footer">
			<span class="footer-tips">支持画笔/矩形/箭头/文字标注，Ctrl+V 粘贴截图，或上传图片</span>
			<div class="footer-actions">
				<button class="btn danger" id="cancelBtn">取消</button>
				<button class="btn primary" id="confirmBtn">确认批注</button>
			</div>
		</div>
	</div>

	<script>
		// 错误捕获：把 JS 错误显示在页面上，便于诊断 iframe 内问题
		window.onerror = function(msg, src, line, col, err) {
			var el = document.getElementById('fatalError');
			if (el) {
				el.style.display = 'block';
				el.textContent = '[onerror] ' + msg + '\n' + (src ? (src + ':' + line + ':' + col) : '') + '\n' + (err && err.stack ? err.stack : String(err));
			}
			console.error('[CoComment draw] onerror:', msg, err);
			return true;
		};
		window.addEventListener('unhandledrejection', function(e) {
			var el = document.getElementById('fatalError');
			if (el) {
				el.style.display = 'block';
				el.textContent = '[unhandledrejection] ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
			}
			console.error('[CoComment draw] unhandledrejection:', e.reason);
		});

		console.log('[CoComment draw] script start, eda defined=' + (typeof eda !== 'undefined'));

		(function() {
			console.log('[CoComment draw] IIFE start');
			if (typeof eda === 'undefined') {
				var el = document.getElementById('fatalError');
				if (el) {
					el.style.display = 'block';
					el.textContent = '[fatal] eda 全局对象未定义，draw iframe 内无法访问 eda.sys_MessageBus';
				}
				console.error('[CoComment draw] eda is undefined in iframe');
				return;
			}

			var TOPIC_FROM_DRAW = 'cocomment:from-draw';
			var TOPIC_TO_DRAW = 'cocomment:to-draw';

			function post(type, data) {
				try {
					eda.sys_MessageBus.publish(TOPIC_FROM_DRAW, Object.assign({ type: type, source: 'cocomment-draw' }, data || {}));
					console.log('[CoComment draw] posted: ' + type);
				} catch (e) {
					console.warn('[CoComment draw] publish failed:', e);
					var el = document.getElementById('fatalError');
					if (el) {
						el.style.display = 'block';
						el.textContent = '[publish ' + type + ' failed] ' + (e && e.stack ? e.stack : String(e));
					}
				}
			}

			var canvas = document.getElementById('mainCanvas');
			var ctx = canvas.getContext('2d');
			var canvasWrap = document.getElementById('canvasWrap');
			var canvasContainer = document.getElementById('canvasContainer');
			var textOverlay = document.getElementById('textOverlay');
			var textInput = document.getElementById('textInput');
			var pasteHint = document.getElementById('pasteHint');
			var canvasInfo = document.getElementById('canvasInfo');

			var currentTool = 'pen';
			var currentColor = '#ff4d4f';
			var currentSize = 4;
			var currentFontSize = 14;
			var isDrawing = false;
			var startX = 0, startY = 0;
			var history = [];
			var maxHistory = 20;
			var bgImage = null;

			function fillWhite() {
				ctx.fillStyle = '#ffffff';
				ctx.fillRect(0, 0, canvas.width, canvas.height);
			}
			fillWhite();
			saveHistory();

			function saveHistory() {
				if (history.length >= maxHistory) history.shift();
				history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
			}

			function undo() {
				if (history.length <= 1) return;
				history.pop();
				ctx.putImageData(history[history.length - 1], 0, 0);
			}

			function getPos(e) {
				var rect = canvas.getBoundingClientRect();
				return { x: Math.round(e.clientX - rect.left), y: Math.round(e.clientY - rect.top) };
			}

			document.querySelectorAll('.tool-btn[data-tool]').forEach(function(btn) {
				btn.addEventListener('click', function() {
					document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) { b.classList.remove('active'); });
					this.classList.add('active');
					currentTool = this.dataset.tool;
					canvas.style.cursor = currentTool === 'text' ? 'text' : 'crosshair';
				});
			});

			document.querySelectorAll('.color-swatch').forEach(function(sw) {
				sw.addEventListener('click', function() {
					document.querySelectorAll('.color-swatch').forEach(function(s) { s.classList.remove('selected'); });
					this.classList.add('selected');
					currentColor = this.dataset.color;
				});
			});

			document.getElementById('sizeSelect').addEventListener('change', function() {
				currentSize = parseInt(this.value, 10);
			});

			document.getElementById('fontSizeSelect').addEventListener('change', function() {
				currentFontSize = parseInt(this.value, 10);
				// 如果文字输入框正显示，同步字号
				if (textOverlay.style.display === 'block') {
					textInput.style.fontSize = currentFontSize + 'px';
					autoResizeTextarea();
				}
			});

			document.getElementById('undoBtn').addEventListener('click', undo);
			document.getElementById('clearBtn').addEventListener('click', function() {
				if (!confirm('确定清空画布吗？')) return;
				fillWhite();
				bgImage = null;
				history = [];
				saveHistory();
				updatePasteHint();
			});

			document.getElementById('uploadBtn').addEventListener('click', function() {
				document.getElementById('fileInput').click();
			});
			document.getElementById('fileInput').addEventListener('change', function(e) {
				var file = e.target.files[0];
				if (!file) return;
				var reader = new FileReader();
				reader.onload = function(ev) { setBackgroundImage(ev.target.result); };
				reader.readAsDataURL(file);
				e.target.value = '';
			});

			function setBackgroundImage(dataUrl) {
				var img = new Image();
				img.onload = function() {
					var maxW = canvas.width, maxH = canvas.height;
					var w = img.width, h = img.height;
					var scale = Math.min(maxW / w, maxH / h, 1);
					w = Math.round(w * scale); h = Math.round(h * scale);
					fillWhite();
					ctx.drawImage(img, 0, 0, w, h);
					bgImage = dataUrl;
					saveHistory();
					updatePasteHint();
				};
				img.src = dataUrl;
			}

			document.addEventListener('paste', function(e) {
				var items = e.clipboardData && e.clipboardData.items;
				if (!items) return;
				for (var i = 0; i < items.length; i++) {
					if (items[i].type.indexOf('image') !== -1) {
						var blob = items[i].getAsFile();
						var reader = new FileReader();
						reader.onload = function(ev) { setBackgroundImage(ev.target.result); };
						reader.readAsDataURL(blob);
						e.preventDefault();
						return;
					}
				}
			});

			function updatePasteHint() {
				pasteHint.style.display = (!bgImage && history.length <= 1) ? 'block' : 'none';
			}

			var snapshot = null;

			canvas.addEventListener('mousedown', function(e) {
				var pos = getPos(e);
				startX = pos.x; startY = pos.y;
				if (currentTool === 'text') { showTextInput(pos.x, pos.y); return; }
				isDrawing = true;
				snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
				if (currentTool === 'pen') {
					ctx.beginPath();
					ctx.moveTo(startX, startY);
					ctx.strokeStyle = currentColor;
					ctx.lineWidth = currentSize;
					ctx.lineCap = 'round';
					ctx.lineJoin = 'round';
				}
			});

			canvas.addEventListener('mousemove', function(e) {
				if (!isDrawing) return;
				var pos = getPos(e);
				if (currentTool === 'pen') {
					ctx.lineTo(pos.x, pos.y);
					ctx.stroke();
				} else if (currentTool === 'rect') {
					ctx.putImageData(snapshot, 0, 0);
					ctx.strokeStyle = currentColor;
					ctx.lineWidth = currentSize;
					ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
				} else if (currentTool === 'arrow') {
					ctx.putImageData(snapshot, 0, 0);
					drawArrow(startX, startY, pos.x, pos.y, currentColor, currentSize);
				}
			});

			canvas.addEventListener('mouseup', function() {
				if (!isDrawing) return;
				isDrawing = false;
				saveHistory();
				updatePasteHint();
			});

			canvas.addEventListener('mouseleave', function() {
				if (isDrawing) { isDrawing = false; saveHistory(); }
			});

			function drawArrow(x1, y1, x2, y2, color, size) {
				var headLen = Math.max(10, size * 3);
				var angle = Math.atan2(y2 - y1, x2 - x1);
				ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = size; ctx.lineCap = 'round';
				ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
				ctx.beginPath();
				ctx.moveTo(x2, y2);
				ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
				ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
				ctx.closePath(); ctx.fill();
			}

			function showTextInput(x, y) {
				textOverlay.style.display = 'block';
				textOverlay.style.left = x + 'px';
				textOverlay.style.top = y + 'px';
				textInput.value = '';
				textInput.style.color = currentColor;
				textInput.style.fontSize = currentFontSize + 'px';
				textInput.style.lineHeight = '1.4';
				// 自动调整 textarea 大小
				autoResizeTextarea();
				textInput.focus();

				textInput.oninput = function() {
					autoResizeTextarea();
				};
				textInput.onkeydown = function(e) {
					if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
						// Ctrl+Enter 提交
						e.preventDefault();
						commitText(x, y);
					}
					else if (e.key === 'Escape') {
						e.preventDefault();
						textOverlay.style.display = 'none';
					}
					// 普通 Enter 让 textarea 默认换行行为生效
				};
				textInput.onblur = function() {
					// 失焦时如果没内容就隐藏，有内容不自动提交（避免误触）
					if (!textInput.value.trim()) {
						textOverlay.style.display = 'none';
					}
				};
			}

			/** 自动调整 textarea 高度适应内容 */
			function autoResizeTextarea() {
				textInput.style.height = 'auto';
				textInput.style.height = Math.max(28, textInput.scrollHeight) + 'px';
				textInput.style.width = 'auto';
				// 宽度至少 120px，最大不超过 400px
				var w = Math.min(400, Math.max(120, textInput.scrollWidth + 4));
				textInput.style.width = w + 'px';
			}

			function commitText(x, y) {
				var text = textInput.value;
				textOverlay.style.display = 'none';
				if (!text.trim()) return;

				// 按换行符分割成多行，逐行绘制
				var lines = text.split('\n');
				var fontSize = currentFontSize;
				var lineHeight = Math.round(fontSize * 1.4);
				ctx.fillStyle = currentColor;
				ctx.font = fontSize + 'px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif';
				ctx.textBaseline = 'top';

				for (var i = 0; i < lines.length; i++) {
					var line = lines[i];
					if (line.length === 0) continue;
					ctx.fillText(line, x, y + i * lineHeight);
				}
				saveHistory();
				updatePasteHint();
			}

			document.getElementById('cancelBtn').addEventListener('click', function() { post('draw:cancel'); });
			document.getElementById('confirmBtn').addEventListener('click', function() {
				var dataUrl = canvas.toDataURL('image/png');
				post('draw:complete', { image: dataUrl, width: canvas.width, height: canvas.height });
			});

			try {
				eda.sys_MessageBus.subscribe(TOPIC_TO_DRAW, function(msg) {
					console.log('[CoComment draw] recv:', msg);
				});
			} catch (e) {
				console.warn('[CoComment draw] subscribe failed:', e);
			}

			post('draw:ready');
			updatePasteHint();
			console.log('[CoComment draw] IIFE end');
		})();
		console.log('[CoComment draw] script end');
	</script>
</body>
</html>
